# Copy this file to .github/workflows/style-review.yml in the target repo.
#
# Required secrets in the target repo:
#   ANTHROPIC_BASE_URL  — corporate Claude API endpoint URL
#   ANTHROPIC_API_KEY   — API key for that endpoint

name: Style Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  style-review:
    uses: scouten-adobe/c2pa-sdk-style-bot/.github/workflows/pr-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repository: ${{ github.repository }}
    secrets:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
