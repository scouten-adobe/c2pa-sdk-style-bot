# Copy this file to .github/workflows/style-review.yml in the target repo.
#
# Required secrets in the target repo:
#   BEDROCK_ENDPOINT_URL  — full Bedrock Converse endpoint URL
#   BEDROCK_BEARER_TOKEN  — bearer token for the corporate Bedrock endpoint

name: Style Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  style-review:
    uses: scouten-adobe/c2pa-sdk-style-bot/.github/workflows/pr-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repository: ${{ github.repository }}
    secrets:
      BEDROCK_ENDPOINT_URL: ${{ secrets.BEDROCK_ENDPOINT_URL }}
      BEDROCK_BEARER_TOKEN: ${{ secrets.BEDROCK_BEARER_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
