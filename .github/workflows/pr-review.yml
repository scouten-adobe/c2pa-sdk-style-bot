# Reusable workflow: style review for pull requests.
#
# Called from target repos like this:
#
#   jobs:
#     style-review:
#       uses: scouten-adobe/c2pa-sdk-style-bot/.github/workflows/pr-review.yml@main
#       with:
#         pr_number: ${{ github.event.pull_request.number }}
#         repository: ${{ github.repository }}
#       secrets:
#         ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Style Review (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number
      repository:
        description: "Target repository in owner/name format"
        required: true
        type: string
      model:
        description: Claude model ID to use
        required: false
        type: string
        default: claude-sonnet-4-6
    secrets:
      ANTHROPIC_BASE_URL:
        description: Base URL for the corporate Claude API endpoint
        required: true
      ANTHROPIC_API_KEY:
        description: API key for the corporate Claude API endpoint
        required: true
      GH_TOKEN:
        description: GitHub token with pull-requests:write permission on the target repo
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out style bot
        uses: actions/checkout@v4
        with:
          repository: scouten-adobe/c2pa-sdk-style-bot
          ref: main
          path: style-bot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r style-bot/scripts/requirements.txt

      - name: Run style review
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ inputs.model }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python style-bot/scripts/review_pr.py
