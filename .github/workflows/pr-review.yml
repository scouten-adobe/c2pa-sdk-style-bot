# Reusable workflow: style review for pull requests.
#
# Called from target repos like this:
#
#   jobs:
#     style-review:
#       uses: scouten-adobe/c2pa-sdk-style-bot/.github/workflows/pr-review.yml@main
#       with:
#         pr_number: ${{ github.event.pull_request.number }}
#         repository: ${{ github.repository }}
#       secrets:
#         BEDROCK_ENDPOINT_URL: ${{ secrets.BEDROCK_ENDPOINT_URL }}
#         BEDROCK_BEARER_TOKEN: ${{ secrets.BEDROCK_BEARER_TOKEN }}
#         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Style Review (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number
      repository:
        description: "Target repository in owner/name format"
        required: true
        type: string
    secrets:
      BEDROCK_ENDPOINT_URL:
        description: Full Bedrock Converse endpoint URL (kept secret to avoid exposing account/region)
        required: true
      BEDROCK_BEARER_TOKEN:
        description: Bearer token for the corporate Bedrock endpoint
        required: true
      GH_TOKEN:
        description: GitHub token with pull-requests:write permission on the target repo
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out style bot
        uses: actions/checkout@v4
        with:
          repository: scouten-adobe/c2pa-sdk-style-bot
          ref: main
          path: style-bot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r style-bot/scripts/requirements.txt

      - name: Run style review
        env:
          BEDROCK_ENDPOINT_URL: ${{ secrets.BEDROCK_ENDPOINT_URL }}
          BEDROCK_BEARER_TOKEN: ${{ secrets.BEDROCK_BEARER_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python style-bot/scripts/review_pr.py
